<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />

    <!-- Primary SEO -->
    <title>Lumière Beauty | Luxury Hair, Skin & Bridal Salon</title>
    <meta name="description" content="Lumière Beauty — a luxury beauty salon offering bridal makeup, keratin hair treatments, gold facials, spa therapies, nail art, and more. Book your appointment today." />
    <meta name="keywords" content="luxury beauty salon, bridal makeup, hair treatment, facial, spa, nail art, keratin treatment, bridal henna, beauty studio" />
    <meta name="author" content="Lumière Beauty" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://lumiere-beauty.replit.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lumiere-beauty.replit.app/" />
    <meta property="og:title" content="Lumière Beauty | Luxury Hair, Skin & Bridal Salon" />
    <meta property="og:description" content="Experience luxury beauty at Lumière Beauty. Expert bridal makeup, hair treatments, facials, spa therapies and nail art. Book your transformation today." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Lumière Beauty" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lumière Beauty | Luxury Hair, Skin & Bridal Salon" />
    <meta name="twitter:description" content="Experience luxury beauty at Lumière Beauty. Expert bridal makeup, hair treatments, facials, spa therapies and nail art." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BeautySalon",
      "name": "Lumière Beauty",
      "description": "Luxury beauty salon offering bridal makeup, hair treatments, facials, spa therapies and nail art.",
      "url": "https://lumiere-beauty.replit.app/",
      "logo": "https://lumiere-beauty.replit.app/favicon.svg",
      "image": "https://lumiere-beauty.replit.app/opengraph.jpg",
      "telephone": "+91-98765-43210",
      "priceRange": "₹₹₹",
      "currenciesAccepted": "INR",
      "paymentAccepted": "Cash, Credit Card, UPI",
      "openingHours": ["Mo-Sa 09:00-20:00", "Su 10:00-18:00"],
      "hasMap": "https://maps.google.com",
      "sameAs": [
        "https://instagram.com",
        "https://wa.me/919876543210"
      ],
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "500"
      },
      "servesCuisine": null,
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Beauty Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Bridal Makeup" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Hair Styling & Treatments" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Skin Facials" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Spa Therapies" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Nail Art" } }
        ]
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
