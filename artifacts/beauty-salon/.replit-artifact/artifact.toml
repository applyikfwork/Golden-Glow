kind = "web"
previewPath = "/"
title = "Luxury Beauty Salon"
version = "1.0.0"
id = "artifacts/beauty-salon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19229

[services.development]
run = "pnpm --filter @workspace/beauty-salon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beauty-salon", "run", "build" ]
publicDir = "artifacts/beauty-salon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19229"
BASE_PATH = "/"
